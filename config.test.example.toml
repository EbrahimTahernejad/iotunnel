# iotunnel — test mode config
# Probes each resolver in the list by replaying the iodine version handshake
# directly (no iodine process spawned). Tests all DNS record types and ranks
# resolvers by RTT. Results are written to results.csv.
# No special privileges required.

mode = "test"

[test]
# iodine_args is used only to extract the topdomain.
# "RESOLVER" marks where the nameserver IP goes (not substituted — test mode
# sends raw DNS probes itself). Keep this line consistent with your actual
# iodine client config so the topdomain is correct.
iodine_args = ["-f", "-r", "RESOLVER", "t1.example.com", "-P", "mysecretpassword"]

# Seconds to wait for a DNS reply from each resolver before giving up
ping_timeout_secs = 5

# Path to a text file with one DNS resolver IP per line.
# Empty lines and lines starting with '#' are skipped.
resolvers_file = "resolvers.txt"

# Number of concurrent probe workers (default: 8)
workers = 8
