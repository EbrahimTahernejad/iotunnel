name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — x86_64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev

      - name: Build iodine
        run: make -C iodine

      - name: Build iotunnel
        run: cargo build --release

      - name: Package release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGING="iotunnel-${TAG}-linux-x86_64"
          mkdir "$STAGING"
          cp target/release/iotunnel "$STAGING/"
          cp iodine/bin/iodine        "$STAGING/"
          cp iodine/bin/iodined       "$STAGING/"
          cp config.server.example.toml "$STAGING/"
          cp config.client.example.toml "$STAGING/"
          cp config.test.example.toml   "$STAGING/"
          tar -czf "iotunnel-linux-x86_64.tar.gz" "$STAGING"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iotunnel-linux-x86_64
          path: iotunnel-linux-x86_64.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
