name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: iotunnel-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: iotunnel-linux-aarch64
            cross: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build iodine (${{ matrix.target }})
        if: "!matrix.cross"
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev
          make -C iodine

      - name: Build iodine (aarch64 cross)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu zlib1g-dev
          make -C iodine \
            CC=aarch64-linux-gnu-gcc \
            AR=aarch64-linux-gnu-ar \
            CFLAGS="-O2"

      - name: Build iotunnel (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build iotunnel (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGING="iotunnel-${TAG}-${{ matrix.artifact }}"
          mkdir "$STAGING"
          cp "target/${{ matrix.target }}/release/iotunnel" "$STAGING/"
          cp iodine/iodine  "$STAGING/" 2>/dev/null || true
          cp iodine/iodined "$STAGING/" 2>/dev/null || true
          cp config.example.toml "$STAGING/"
          tar -czf "${{ matrix.artifact }}.tar.gz" "$STAGING"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
